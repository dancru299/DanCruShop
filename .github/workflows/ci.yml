name: CI

# Quality gate for every push to main and every pull request.
# Mirrors the local gates in README.md: lint -> test -> build.
on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a new push doesn't waste minutes
# finishing an already-stale run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least privilege: CI only needs to read the repository.
permissions:
  contents: read

jobs:
  quality:
    name: Lint, test, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # All data-fetching pages are `force-dynamic`, so the build never
          # connects to Supabase; the only build-time fetch (sitemap.ts) swallows
          # network errors and returns []. These placeholders only satisfy the
          # "Missing <var>" env guards in lib/supabase/*. They are NOT secrets and
          # must never point at a real project. Configure real values per
          # environment in the hosting provider's secret manager.
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder-anon-key
          SUPABASE_SERVICE_ROLE_KEY: ci-placeholder-service-role-key
